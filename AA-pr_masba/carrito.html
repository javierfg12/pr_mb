<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito – MásBarata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 3rem; padding: 2rem 5rem 5rem; max-width: 1200px; margin: 0 auto; }
    .cart-page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 300; margin-bottom: 2rem; }
    .cart-page-title em { font-style: italic; color: var(--plata-dark); }
    .cart-item { display: grid; grid-template-columns: 100px 1fr auto; gap: 1.5rem; align-items: center; padding: 1.5rem 0; border-bottom: 0.5px solid #e5e5e5; }
    .cart-item-img { background: #1a1a1a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
    .cart-item-img svg { width: 70px; height: 70px; }
    .cart-item-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 400; margin-bottom: 0.3rem; }
    .cart-item-opts { font-size: 0.72rem; color: #888; line-height: 1.7; }
    .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.6rem; }
    .cart-item-price { font-family: var(--font-display); font-size: 1.2rem; font-weight: 300; }
    .cart-qty { display: flex; align-items: center; border: 0.5px solid #ccc; }
    .cart-qty-btn { width: 30px; height: 30px; background: none; border: none; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .cart-qty-btn:hover { background: #f0f0f0; }
    .cart-qty-val { width: 32px; text-align: center; font-size: 0.85rem; border-left: 0.5px solid #ccc; border-right: 0.5px solid #ccc; line-height: 30px; }
    .cart-remove { font-size: 0.68rem; color: #aaa; text-decoration: underline; cursor: pointer; border: none; background: none; font-family: var(--font-body); }
    .cart-remove:hover { color: #c0392b; }
    .order-summary { background: #f8f7f4; padding: 2rem; height: fit-content; position: sticky; top: 90px; }
    .summary-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 300; margin-bottom: 1.5rem; }
    .summary-line { display: flex; justify-content: space-between; font-size: 0.83rem; color: #555; margin-bottom: 0.7rem; }
    .summary-line.total { font-size: 1rem; font-weight: 500; color: var(--negro); padding-top: 0.8rem; border-top: 0.5px solid #ddd; margin-top: 0.5rem; }
    .promo-row { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .promo-input { flex: 1; border: 0.5px solid #ccc; padding: 0.5rem 0.8rem; font-family: var(--font-body); font-size: 0.8rem; outline: none; }
    .promo-input:focus { border-color: var(--negro); }
    .promo-btn { background: none; border: 0.5px solid var(--negro); padding: 0.5rem 0.9rem; font-family: var(--font-body); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .promo-btn:hover { background: var(--negro); color: #fff; }
    .cart-empty { padding: 5rem 5rem; text-align: center; }
    .cart-empty-title { font-family: var(--font-display); font-size: 2rem; font-weight: 300; margin-bottom: 1rem; }
    .cart-empty-sub { font-size: 0.88rem; color: #888; margin-bottom: 2rem; }
    .shipping-note { font-size: 0.72rem; color: #2a7a3a; text-align: center; margin-top: 0.8rem; }
    .page-breadcrumb { padding: 1.2rem 5rem 0; font-size: 0.72rem; color: #888; }
    .page-breadcrumb a { color: #888; text-decoration: none; }
    @media(max-width:900px){ .cart-layout{grid-template-columns:1fr;padding:1.5rem;} .order-summary{position:static;} .cart-empty{padding:3rem 1.5rem;} }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">más<span>barata</span></a>
    <ul class="nav-links">
      <li><a href="catalogo.html?cat=collares">Collares</a></li>
      <li><a href="catalogo.html?cat=pulseras">Pulseras</a></li>
      <li><a href="catalogo.html?cat=pendientes">Pendientes</a></li>
      <li><a href="personalizados.html">Personalizados</a></li>
      <li><a href="catalogo.html?cat=colgantes">Colgantes</a></li>
      <li><a href="catalogo.html?outlet=1">Outlet</a></li>
    </ul>
    <div class="nav-right">
      <a href="tel:636276934">636 276 934</a>
      <a href="carrito.html" class="btn-cart cart-count">Carrito (0)</a>
    </div>
  </nav>

  <div class="page-breadcrumb">
    <a href="index.html">Inicio</a> / Carrito
  </div>

  <div id="cartContent"></div>

  <footer class="footer" style="margin-top:4rem">
    <div class="footer-bottom">
      <p class="footer-copy">© 2026 MásBarata · Villaviciosa de Odón, Madrid</p>
      <p class="footer-phone">636 276 934 · info@masbarata.es</p>
    </div>
  </footer>

  <script src="store.js"></script>
  <script>
    function renderCart() {
      const items = Cart.get();
      const container = document.getElementById('cartContent');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="cart-empty">
            <svg viewBox="0 0 80 80" width="60" height="60" style="margin:0 auto 1.5rem;display:block;opacity:.3">
              <circle cx="40" cy="40" r="35" fill="none" stroke="#888" stroke-width="2"/>
              <path d="M25,30 L30,55 L50,55 L55,30 Z" fill="none" stroke="#888" stroke-width="1.5"/>
              <line x1="33" y1="30" x2="33" y2="55" stroke="#888" stroke-width="1"/>
              <line x1="40" y1="30" x2="40" y2="55" stroke="#888" stroke-width="1"/>
              <line x1="47" y1="30" x2="47" y2="55" stroke="#888" stroke-width="1"/>
            </svg>
            <p class="cart-empty-title">Tu carrito está <em style="font-style:italic;color:var(--plata-dark)">vacío</em></p>
            <p class="cart-empty-sub">Aún no has añadido ninguna joya. ¡Empieza a explorar!</p>
            <a href="catalogo.html" class="btn-primary" style="display:inline-block">Ver catálogo</a>
          </div>`;
        return;
      }

      const subtotal = Cart.total();
      const shipping = subtotal >= 30 ? 0 : 3.99;
      const total = subtotal + shipping;

      const itemsHtml = items.map(item => {
        const p = CATALOG.find(x => x.id === item.id);
        if (!p) return '';
        const optsHtml = Object.entries(item.opts || {}).filter(([,v]) => v).map(([k,v]) => {
          const labels = { length:'Longitud', finish:'Acabado', custom:'Texto', type:'Tipo' };
          return `${labels[k]||k}: ${v}`;
        }).join(' · ');
        return `
          <div class="cart-item" data-id="${item.id}" data-opts='${JSON.stringify(item.opts||{})}'>
            <div class="cart-item-img">${p.svg}</div>
            <div>
              <p class="cart-item-name">${p.name}</p>
              ${optsHtml ? `<p class="cart-item-opts">${optsHtml}</p>` : ''}
              <button class="cart-remove" onclick="removeItem(${item.id}, ${JSON.stringify(item.opts||{}).replace(/"/g,'&quot;')})">Eliminar</button>
            </div>
            <div class="cart-item-right">
              <p class="cart-item-price">${fmt(p.price * item.qty)}</p>
              <div class="cart-qty">
                <button class="cart-qty-btn" onclick="changeQty(${item.id}, ${item.qty-1}, ${JSON.stringify(item.opts||{}).replace(/"/g,'&quot;')})">−</button>
                <span class="cart-qty-val">${item.qty}</span>
                <button class="cart-qty-btn" onclick="changeQty(${item.id}, ${item.qty+1}, ${JSON.stringify(item.opts||{}).replace(/"/g,'&quot;')})">+</button>
              </div>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = `
        <div class="cart-layout">
          <div>
            <h1 class="cart-page-title">Tu <em>carrito</em></h1>
            ${itemsHtml}
            <p style="margin-top:1.5rem"><a href="catalogo.html" style="font-size:.75rem;color:#888;text-decoration:underline;text-underline-offset:4px">← Seguir comprando</a></p>
          </div>
          <div class="order-summary">
            <p class="summary-title">Resumen del pedido</p>
            <div class="summary-line"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
            <div class="summary-line"><span>Envío</span><span>${shipping === 0 ? '<span style="color:#2a7a3a">Gratis</span>' : fmt(shipping)}</span></div>
            <div class="summary-line total"><span>Total</span><span>${fmt(total)}</span></div>
            ${shipping > 0 ? `<p style="font-size:.7rem;color:#888;margin-top:.5rem">Envío gratis a partir de 30 €</p>` : ''}
            <div class="promo-row">
              <input class="promo-input" type="text" placeholder="Código promocional" id="promoInput">
              <button class="promo-btn" onclick="applyPromo()">Aplicar</button>
            </div>
            <p id="promoMsg" style="font-size:.7rem;color:transparent;margin-bottom:.5rem">.</p>
            <a href="checkout.html" class="btn-primary" style="display:block;text-align:center;padding:1rem;font-size:.8rem">Finalizar compra →</a>
            <p class="shipping-note">✓ Pago 100% seguro · SSL</p>
          </div>
        </div>`;
    }

    function removeItem(id, opts) {
      Cart.remove(id, typeof opts === 'string' ? JSON.parse(opts) : opts);
      renderCart();
    }

    function changeQty(id, qty, opts) {
      const o = typeof opts === 'string' ? JSON.parse(opts) : opts;
      if (qty < 1) { Cart.remove(id, o); }
      else { Cart.updateQty(id, qty, o); }
      renderCart();
    }

    function applyPromo() {
      const code = document.getElementById('promoInput')?.value?.toUpperCase();
      const msg = document.getElementById('promoMsg');
      if (!msg) return;
      if (code === 'PLATA10') { msg.style.color='#2a7a3a'; msg.textContent='✓ Código aplicado: 10% de descuento'; }
      else { msg.style.color='#c0392b'; msg.textContent='Código no válido'; }
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
