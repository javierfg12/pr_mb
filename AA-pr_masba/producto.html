<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto – MásBarata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; padding: 2rem 5rem 5rem; max-width: 1200px; margin: 0 auto; }
    .product-gallery { position: sticky; top: 90px; height: fit-content; }
    .product-main-img { background: #1a1a1a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .product-main-img svg { width: 60%; height: 60%; }
    .product-thumbs { display: flex; gap: 0.5rem; }
    .thumb { width: 72px; height: 72px; background: #1e1e1e; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.2s; }
    .thumb.active { border-color: var(--acento); }
    .thumb svg { width: 50px; height: 50px; }
    .product-info { padding-top: 1rem; }
    .product-cat { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--plata-dark); margin-bottom: 0.6rem; }
    .product-title { font-family: var(--font-display); font-size: 2.2rem; font-weight: 300; line-height: 1.15; margin-bottom: 0.8rem; }
    .product-stars { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .stars { color: #c8a84b; font-size: 0.85rem; letter-spacing: 0.1em; }
    .review-count { font-size: 0.72rem; color: #888; }
    .product-price-block { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; }
    .product-price { font-family: var(--font-display); font-size: 2.4rem; font-weight: 300; color: var(--negro); }
    .product-price-old { font-size: 1.1rem; color: #aaa; text-decoration: line-through; }
    .product-saving { font-size: 0.72rem; background: var(--acento); color: #111; padding: 0.2rem 0.5rem; }
    .product-desc { font-size: 0.88rem; color: #555; line-height: 1.8; margin-bottom: 2rem; border-top: 0.5px solid #e5e5e5; padding-top: 1.5rem; }
    .option-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--negro); margin-bottom: 0.6rem; font-weight: 500; }
    .option-btns { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .opt-btn { border: 0.5px solid #ccc; background: none; padding: 0.4rem 1rem; font-family: var(--font-body); font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
    .opt-btn.active, .opt-btn:hover { border-color: var(--negro); background: var(--negro); color: #fff; }
    .qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .qty-ctrl { display: flex; align-items: center; border: 0.5px solid #ccc; }
    .qty-btn { width: 36px; height: 36px; background: none; border: none; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
    .qty-btn:hover { background: #f0f0f0; }
    .qty-val { width: 40px; text-align: center; font-size: 0.9rem; border: none; border-left: 0.5px solid #ccc; border-right: 0.5px solid #ccc; padding: 0 8px; line-height: 36px; }
    .btn-add-cart { flex: 1; background: var(--negro); color: var(--crema); border: none; padding: 1rem; font-family: var(--font-body); font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-add-cart:hover { background: #2a2a2a; }
    .btn-add-cart.added { background: #1a5c2a; }
    .trust-mini { display: flex; gap: 1.5rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 0.5px solid #e5e5e5; flex-wrap: wrap; }
    .trust-mini-item { font-size: 0.7rem; color: #777; display: flex; align-items: center; gap: 0.4rem; }
    .trust-mini-item::before { content: '✓'; color: #2a7a3a; font-weight: 700; }
    .related-section { padding: 4rem 5rem; background: #f8f7f4; }
    .page-breadcrumb { padding: 1.2rem 5rem 0; font-size: 0.72rem; color: #888; }
    .page-breadcrumb a { color: #888; text-decoration: none; }
    .page-breadcrumb a:hover { color: var(--negro); }
    .custom-input { width: 100%; border: 0.5px solid #ccc; padding: 0.6rem 0.9rem; font-family: var(--font-body); font-size: 0.85rem; margin-bottom: 1.5rem; outline: none; transition: border-color 0.2s; }
    .custom-input:focus { border-color: var(--negro); }
    @media(max-width:900px){ .product-layout{grid-template-columns:1fr;padding:1.5rem;gap:2rem;} .product-gallery{position:static;} .related-section{padding:3rem 1.5rem;} .page-breadcrumb{padding:1rem 1.5rem 0;} }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">más<span>barata</span></a>
    <ul class="nav-links">
      <li><a href="catalogo.html?cat=collares">Collares</a></li>
      <li><a href="catalogo.html?cat=pulseras">Pulseras</a></li>
      <li><a href="catalogo.html?cat=pendientes">Pendientes</a></li>
      <li><a href="personalizados.html">Personalizados</a></li>
      <li><a href="catalogo.html?cat=colgantes">Colgantes</a></li>
      <li><a href="catalogo.html?outlet=1">Outlet</a></li>
    </ul>
    <div class="nav-right">
      <a href="tel:636276934">636 276 934</a>
      <a href="carrito.html" class="btn-cart cart-count">Carrito (0)</a>
    </div>
  </nav>

  <div class="page-breadcrumb" id="breadcrumb">
    <a href="index.html">Inicio</a> / <a href="catalogo.html" id="breadCat">Productos</a> / <span id="breadName">…</span>
  </div>

  <div class="product-layout">
    <!-- GALERÍA -->
    <div class="product-gallery">
      <div class="product-main-img" id="mainImg"></div>
      <div class="product-thumbs" id="thumbs"></div>
    </div>

    <!-- INFO -->
    <div class="product-info" id="productInfo"></div>
  </div>

  <!-- RELACIONADOS -->
  <section class="related-section">
    <div class="section-header" style="margin-bottom:2rem">
      <h2 class="section-title">También te <em>puede gustar</em></h2>
    </div>
    <div class="prod-grid" id="relatedGrid" style="grid-template-columns:repeat(4,1fr)"></div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p class="footer-copy">© 2026 MásBarata · Villaviciosa de Odón, Madrid</p>
      <p class="footer-phone">636 276 934 · info@masbarata.es</p>
    </div>
  </footer>

  <script src="store.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const id = parseInt(getParam('id'));
      const p = CATALOG.find(x => x.id === id);
      if (!p) { document.body.innerHTML = '<p style="padding:4rem;text-align:center">Producto no encontrado. <a href="catalogo.html">Volver al catálogo</a></p>'; return; }

      document.title = `${p.name} – MásBarata`;
      document.getElementById('breadName').textContent = p.name;
      document.getElementById('breadCat').href = `catalogo.html?cat=${p.cat}`;
      document.getElementById('breadCat').textContent = { collares:'Collares', pulseras:'Pulseras', pendientes:'Pendientes', colgantes:'Colgantes', personalizados:'Personalizados' }[p.cat] || 'Productos';

      // Galería (3 "fotos" con variaciones del SVG)
      document.getElementById('mainImg').innerHTML = p.svg;
      document.getElementById('thumbs').innerHTML = [0,1,2].map(i =>
        `<div class="thumb ${i===0?'active':''}" data-i="${i}">${p.svg}</div>`
      ).join('');
      document.querySelectorAll('.thumb').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
        });
      });

      // Info
      const saving = p.oldPrice ? Math.round((1 - p.price/p.oldPrice)*100) : 0;
      const isPersonalizable = p.cat === 'personalizados' || p.badge === 'Personalizable';
      const catLabels = { collares:'Colección Collares', pulseras:'Colección Pulseras', pendientes:'Colección Pendientes', colgantes:'Colección Colgantes', personalizados:'Joyería Personalizada' };

      document.getElementById('productInfo').innerHTML = `
        <p class="product-cat">${catLabels[p.cat] || p.cat}</p>
        <h1 class="product-title">${p.name}</h1>
        <div class="product-stars">
          <span class="stars">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))}</span>
          <span class="review-count">${p.rating} · ${p.reviews} valoraciones</span>
        </div>
        <div class="product-price-block">
          <span class="product-price">${fmt(p.price)}</span>
          ${p.oldPrice ? `<span class="product-price-old">${fmt(p.oldPrice)}</span><span class="product-saving">-${saving}%</span>` : ''}
        </div>

        ${isPersonalizable ? `
          <p class="option-label">Personalización</p>
          <input class="custom-input" id="customText" type="text" placeholder="Escribe el nombre o texto (máx. 20 caracteres)" maxlength="20">
        ` : ''}

        <p class="option-label">Longitud de cadena</p>
        <div class="option-btns" id="lengthOpts">
          <button class="opt-btn active">40 cm</button>
          <button class="opt-btn">45 cm</button>
          <button class="opt-btn">50 cm</button>
        </div>

        <p class="option-label">Acabado</p>
        <div class="option-btns" id="finishOpts">
          <button class="opt-btn active">Plata</button>
          <button class="opt-btn">Plata envejecida</button>
          <button class="opt-btn">Baño en oro</button>
        </div>

        <p class="product-desc">${p.desc}</p>

        <div class="qty-row">
          <div class="qty-ctrl">
            <button class="qty-btn" id="qtyMinus">−</button>
            <span class="qty-val" id="qtyVal">1</span>
            <button class="qty-btn" id="qtyPlus">+</button>
          </div>
          <button class="btn-add-cart" id="addCartBtn">Añadir al carrito</button>
        </div>

        <a href="personalizados.html" style="display:block;text-align:center;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#888;text-decoration:underline;text-underline-offset:4px;margin-bottom:1.5rem">
          ¿Quieres algo completamente único? → Ir a Personalizados
        </a>

        <div class="trust-mini">
          <span class="trust-mini-item">Plata de Ley 925</span>
          <span class="trust-mini-item">Envío 24/48h</span>
          <span class="trust-mini-item">Devolución gratuita</span>
          <span class="trust-mini-item">Caja regalo incluida</span>
        </div>
      `;

      // Quantity
      let qty = 1;
      document.getElementById('qtyMinus').addEventListener('click', () => { if(qty>1){qty--;document.getElementById('qtyVal').textContent=qty;} });
      document.getElementById('qtyPlus').addEventListener('click', () => { qty++;document.getElementById('qtyVal').textContent=qty; });

      // Option toggles
      ['lengthOpts','finishOpts'].forEach(grpId => {
        document.getElementById(grpId)?.querySelectorAll('.opt-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.getElementById(grpId).querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
          });
        });
      });

      // Add to cart
      document.getElementById('addCartBtn').addEventListener('click', () => {
        const opts = {
          length: document.querySelector('#lengthOpts .opt-btn.active')?.textContent,
          finish: document.querySelector('#finishOpts .opt-btn.active')?.textContent,
          custom: document.getElementById('customText')?.value || ''
        };
        Cart.add(p.id, qty, opts);
        const btn = document.getElementById('addCartBtn');
        btn.textContent = '✓ Añadido al carrito';
        btn.classList.add('added');
        setTimeout(() => { btn.textContent = 'Añadir al carrito'; btn.classList.remove('added'); }, 2000);
      });

      // Relacionados
      const related = CATALOG.filter(x => x.id !== p.id && x.cat === p.cat).slice(0, 4);
      document.getElementById('relatedGrid').innerHTML = related.map(r => `
        <a href="producto.html?id=${r.id}" class="prod-card" style="text-decoration:none">
          <div class="prod-img" style="background:#1e1e1e">${r.svg}${r.badge?`<span class="badge-sale">${r.badge}</span>`:''}</div>
          <p class="prod-name" style="color:var(--negro)">${r.name}</p>
          <div class="prod-prices">
            <span class="prod-price" style="color:var(--negro)">${fmt(r.price)}</span>
            ${r.oldPrice?`<span class="prod-price-old" style="color:#aaa">${fmt(r.oldPrice)}</span>`:''}
          </div>
        </a>`).join('');
    });
  </script>
</body>
</html>
