<svg viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg" width="420" height="520">
  <rect width="420" height="520" fill="#111"/>

  <!-- Collar / cadena -->
  <ellipse cx="210" cy="200" rx="130" ry="18" fill="none" stroke="#999" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="210" cy="200" rx="110" ry="14" fill="none" stroke="#bbb" stroke-width="0.8" opacity="0.3"/>

  <!-- Puntos cadena -->
  <g opacity="0.5">
    <circle cx="80"  cy="200" r="2" fill="#aaa"/>
    <circle cx="100" cy="208" r="2" fill="#aaa"/>
    <circle cx="122" cy="212" r="2" fill="#aaa"/>
    <circle cx="146" cy="214" r="2" fill="#aaa"/>
    <circle cx="170" cy="215" r="2" fill="#aaa"/>
    <circle cx="195" cy="216" r="2" fill="#aaa"/>
    <circle cx="210" cy="216" r="2" fill="#ccc"/>
    <circle cx="225" cy="216" r="2" fill="#aaa"/>
    <circle cx="250" cy="215" r="2" fill="#aaa"/>
    <circle cx="274" cy="214" r="2" fill="#aaa"/>
    <circle cx="298" cy="212" r="2" fill="#aaa"/>
    <circle cx="320" cy="208" r="2" fill="#aaa"/>
    <circle cx="340" cy="200" r="2" fill="#aaa"/>
  </g>

  <!-- Hilo del colgante -->
  <line x1="210" y1="216" x2="210" y2="260" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>

  <!-- Diamante / Gota -->
  <g transform="translate(210,300)">
    <polygon points="0,-40 28,0 0,22 -28,0"  fill="#C8C8C8" opacity="0.85"/>
    <polygon points="0,-40 28,0 0,22 -28,0"  fill="none" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
    <polygon points="0,-40 28,0 0,-10"        fill="#e8e8e8" opacity="0.7"/>
    <polygon points="-28,0 0,-10 0,22"        fill="#888" opacity="0.6"/>
    <polygon points="28,0 0,-10 0,22"         fill="#aaa" opacity="0.6"/>
    <line x1="-8" y1="-28" x2="8" y2="-20"   stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Precio -->
  <rect x="140" y="390" width="140" height="56" fill="rgba(250,249,246,0.06)"/>
  <text x="210" y="415" text-anchor="middle"
    font-family="Georgia,serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="3">
    COLLAR CON NOMBRE
  </text>
  <text x="210" y="437" text-anchor="middle"
    font-family="Georgia,serif" font-size="22" font-weight="300" fill="#FAF9F6">
    24,99 €
  </text>

  <!-- Esquinas decorativas -->
  <line x1="30"  y1="30"  x2="70"  y2="30"  stroke="#444" stroke-width="0.8"/>
  <line x1="30"  y1="30"  x2="30"  y2="70"  stroke="#444" stroke-width="0.8"/>
  <line x1="390" y1="30"  x2="350" y2="30"  stroke="#444" stroke-width="0.8"/>
  <line x1="390" y1="30"  x2="390" y2="70"  stroke="#444" stroke-width="0.8"/>
  <line x1="30"  y1="490" x2="70"  y2="490" stroke="#444" stroke-width="0.8"/>
  <line x1="30"  y1="490" x2="30"  y2="450" stroke="#444" stroke-width="0.8"/>
  <line x1="390" y1="490" x2="350" y2="490" stroke="#444" stroke-width="0.8"/>
  <line x1="390" y1="490" x2="390" y2="450" stroke="#444" stroke-width="0.8"/>
</svg>
